<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Asco Workorder - Arbeidsordresystem</title>
    <meta name="description" content="Profesjonelt arbeidsordre- og tidssporingssystem for feltarbeidere og administrasjon. Effektiv oppgavehåndtering fra mobil og desktop." />
    <meta name="author" content="Asco" />
    <meta name="theme-color" content="#2563eb" />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="format-detection" content="telephone=no" />

    <meta property="og:title" content="Asco Workorder - Arbeidsordresystem" />

    <meta name="twitter:card" content="summary_large_image" />
